<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار كيمياء تحصيلي - القسم الثاني</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --light-blue: #e0f2fe; --primary: #0284c7; --success: #16a34a; --danger: #dc2626; --accent: #0369a1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--panel); border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        .header-brand { 
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); 
            padding: 25px; 
            text-align: center;
            color: white;
            font-weight: bold;
        }
        .header-brand h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-brand p { margin: 5px 0 0; font-size: 16px; opacity: 0.9; }

        .welcome-screen { padding: 50px 20px; text-align: center; }
        .welcome-screen h2 { color: #0f172a; margin-bottom: 10px; }
        .welcome-screen p { color: #64748b; margin-bottom: 30px; font-size: 18px; }
        
        input[type="text"] { width: 65%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 15px; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--light-blue); }

        .quiz-screen { display: none; padding: 30px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px; font-weight: bold; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }

        .q-card { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 25px; }
        .q-text { font-size: 22px; font-weight: bold; color: #0f172a; line-height: 1.6; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option { padding: 18px; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 18px; text-align: right; position: relative; }
        .option:hover { border-color: var(--primary); background: #f0f9ff; transform: scale(1.01); }
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger) !important; }

        .feedback-box { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; border: 2px solid; text-align: center; font-weight: bold; font-size: 18px; }
        .fb-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .fb-danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 15px; cursor: pointer; font-size: 19px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        #next-btn { background: #334155; display: none; margin-top: 20px; }

        #result-screen { display:none; padding: 30px; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 14px; min-width: 600px; }
        .summary-table th, .summary-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        .summary-table th { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1>اختبار كيمياء تحصيلي - القسم الثاني</h1>
        <p>الخواص والتغيرات والمخاليط</p>
    </div>

    <div id="start-screen" class="welcome-screen">
        <h2>مرحباً بك أيها المبدع/ة 💡</h2>
        <p>اختبار شامل في (القسم الثاني) يركز على الخواص الكيميائية والفيزيائية وبنية الذرة</p>
        <input type="text" id="student-name" placeholder="فضلاً، أدخل اسمك الثلاثي للبدء">
        <br>
        <button class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="stats-bar">
            <span>👤 المختبر: <span id="display-name" style="color:var(--primary)"></span></span>
            <span>📝 السؤال: <span id="q-counter"></span></span>
        </div>
        <div class="q-card">
            <div class="q-text" id="q-text"></div>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-box" class="feedback-box">
            <span id="fb-title"></span>
        </div>
        <div style="text-align: center;">
            <button id="next-btn" class="btn" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-screen">
        <div style="text-align:center;">
            <h2 id="res-title"></h2>
            <div id="res-score" style="font-size: 38px; font-weight: 900; color: var(--primary); margin: 20px;"></div>
            <p id="res-eval" style="font-size: 18px; color: #64748b;"></p>
        </div>
        <hr style="border:0; border-top:1px solid #e2e8f0; margin: 30px 0;">
        <h3>📊 مراجعة الأداء:</h3>
        <div style="overflow-x:auto;">
            <table class="summary-table">
                <thead>
                    <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الإجابة الصحيحة</th><th>النتيجة</th></tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <div style="text-align:center; margin-top:40px;">
            <button class="btn" onclick="location.reload()">محاولة مرة أخرى 🔄</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { "text": "أي الخواص التالية يمثل خاصية فيزيائية؟", "options": {"أ": "تكون صدأ الحديد", "ب": "احتراق قطعة خشب", "ج": "فقد الفضة بريقها", "د": "توصيل النحاس للكهرباء"}, "answer": "د" },
        { "text": "أي الآتي يمثل خاصية فيزيائية؟", "options": {"أ": "تكون صدأ الحديد", "ب": "اشتغال الصوديوم في الماء", "ج": "تأكسد الفضة", "د": "الألمنيوم لونه فضي"}, "answer": "د" },
        { "text": "رائحة عطر تم بخه كانت جميلة، يعد هذا:", "options": {"أ": "تغير فيزيائي", "ب": "تغير كيميائي", "ج": "خاصية فيزيائية", "د": "خاصية كيميائية"}, "answer": "ج" },
        { "text": "أي الخواص التالية مميزة؟", "options": {"أ": "الكتلة", "ب": "الطول", "ج": "الحجم", "د": "الكثافة"}, "answer": "د" },
        { "text": "الكتلة تعد خاصية...", "options": {"أ": "نوعية", "ب": "غير مميزة", "ج": "مميزة", "د": "كيميائية"}, "answer": "ب" },
        { "text": "أي التالي يمثل خاصية كيميائية؟", "options": {"أ": "يصدا الحديد عندما يتعرض سطحه للهواء", "ب": "يغلي الماء ويتصاعد عند درجة 100°C", "ج": "تنصهر المادة عند تعرضها لحرارة عالية", "د": "يذوب الملح في الماء الساخن"}, "answer": "أ" },
        { "text": "أي الآتي يعد خاصية كيميائية؟", "options": {"أ": "الماء عديم اللون", "ب": "ملح الطعام بلوري صلب", "ج": "يتحلل السكر إلى كربون وبخار وماء", "د": "الألمنيوم لونه فضي"}, "answer": "ج" },

        { "text": "جميع الآتي خواص فيزيائية للألمنيوم عدا خاصية واحدة هي:", "options": {"أ": "فضي لامع", "ب": "قابل للتشكل", "ج": "ينصهر عند درجة حرارة عالية", "د": "لا يتأكسد مع الهواء الجوي"}, "answer": "د" },
        { "text": "أي خواص السكر الآتية ليست فيزيائية؟", "options": {"أ": "يوجد على شكل بلورات صلبة في درجات الحرارة العادية", "ب": "يظهر بلون أبيض", "ج": "طعمه حلو", "د": "يتحلل إلى كربون وبخار ماء عند تسخينه"}, "answer": "د" },
        { "text": "من خواص النحاس أنه يكون مركب كربونات النحاس الأخضر عندما يتعرض للهواء الرطب، وهذه الخاصية:", "options": {"أ": "فيزيائية", "ب": "كيميائية", "ج": "كمية", "د": "حيوية"}, "answer": "ب" },
        { "text": "أي من الآتي خاصية (أو عملية تفاعل) كيميائية؟", "options": {"أ": "تغير لون الفضة", "ب": "غليان الإيثير", "ج": "تسامي اليود", "د": "ذوبان الجليد"}, "answer": "أ" },
        { "text": "ما التغير الذي يحدث في الخواص الفيزيائية ولا يؤدي إلى تكوين مواد جديدة؟", "options": {"أ": "التغير الفيزيائي", "ب": "الخاصية الفيزيائية", "ج": "التغير الكيميائي", "د": "الخاصية الكيميائية"}, "answer": "أ" },
        { "text": "ما التغير الذي يحدث في تركيب المادة وخواصها ويؤدي إلى تكوين مواد جديدة؟", "options": {"أ": "التغير الفيزيائي", "ب": "الخاصية الفيزيائية", "ج": "التغير الكيميائي", "د": "التجمد"}, "answer": "ج" },
        { "text": "أحد الأمثلة التالية يعتبر تغير فيزيائي:", "options": {"أ": "هضم الطعام", "ب": "كسر الزجاج", "ج": "صدأ الفولاذ", "د": "حرق الخشب"}, "answer": "ب" },
        { "text": "أي مما يأتي تغير كيميائي؟", "options": {"أ": "ذوبان الجليد", "ب": "احتراق فتيلة الشمعة", "ج": "تكثف بخار الماء", "د": "انصهار الزئبق"}, "answer": "ب" },
        { "text": "أي الآتي يصنف من التغيرات الفيزيائية للمادة؟", "options": {"أ": "الاحتراق", "ب": "الصدأ", "ج": "التخمر", "د": "الانصهار"}, "answer": "د" },
        { "text": "احتراق البنزين في السيارة يعد:", "options": {"أ": "تغير كيميائي", "ب": "تغير فيزيائي", "ج": "خاصية فيزيائية", "د": "خاصية كيميائية"}, "answer": "أ" },
        { "text": "ذوبان الجليد يعد؟", "options": {"أ": "خاصية فيزيائية", "ب": "خاصية كيميائية", "ج": "تغير كيميائي", "د": "تغير فيزيائي"}, "answer": "د" },
        { "text": "الاحتراق يعد؟", "options": {"أ": "تغير كيميائي", "ب": "تغير فيزيائي", "ج": "خاصية فيزيائية", "د": "خاصية كيميائية"}, "answer": "أ" },
        { "text": "كسر قلم الرصاص يعتبر:", "options": {"أ": "تغير كيميائي", "ب": "خاصية فيزيائية", "ج": "تغير فيزيائي", "د": "خاصية فيزيائية"}, "answer": "ج" },
        { "text": "أي من الآتي تغير كيميائي؟", "options": {"أ": "مقاومة الصدأ", "ب": "تغير درجة الحرارة", "ج": "التوصيل الكهربائي", "د": "الصلابة"}, "answer": "أ" },
        { "text": "عند مزج مادتين نقيتين دون أن تفقد خواصها يتكون:", "options": {"أ": "المخلوط", "ب": "العنصر", "ج": "المركب", "د": "الذرة"}, "answer": "أ" },
        { "text": "يتكون من مادتين نقيتين تحتفظ كل منهما بخواصها:", "options": {"أ": "العنصر", "ب": "المركب", "ج": "المخلوط", "د": "المادة النقية"}, "answer": "ج" },
        { "text": "من خواص المخلوط:", "options": {"أ": "لا تفقد مكوناته خواصها", "ب": "يتكون بنسب ثابتة", "ج": "ينتج عن تفاعل كيميائي", "د": "يفصل بطرق كيميائية"}, "answer": "أ" },
        { "text": "إذا كانت المواد الذائبة لتكوين المحلول ونسب المواد في العينة ثابتة دائماً، هذا يمثل:", "options": {"أ": "مخلوط غير متجانس", "ب": "مخلوط متجانس", "ج": "مركبات", "د": "نظائر"}, "answer": "ب" },
        { "text": "أي مما يأتي مخلوط متجانس؟", "options": {"أ": "الدم", "ب": "الحليب", "ج": "السبيكة", "د": "الدخان"}, "answer": "ج" },
        { "text": "المزيج المتجانس من مادتين نقيتين أو أكثر هو:", "options": {"أ": "المذاب", "ب": "المذيب", "ج": "المحلول", "د": "المركب"}, "answer": "ج" },
        { "text": "ما نوع مخلوط السبيكة؟", "options": {"أ": "غاز - غاز", "ب": "صلب - صلب", "ج": "صلب - سائل", "د": "سائل - غاز"}, "answer": "ب" },
        { "text": "الهواء الجوي يحوي مذيب ومذاب من نوع:", "options": {"أ": "سائل - سائل", "ب": "غاز - سائل", "ج": "سائل - صلب", "د": "غاز - غاز"}, "answer": "د" },
        { "text": "الهواء الرطب يعد محلول:", "options": {"أ": "غاز - سائل", "ب": "سائل - سائل", "ج": "سائل - غاز", "د": "سائل - غاز"}, "answer": "ب" },
        { "text": "محلول حمض الكبريتيك المخفف يحوي مذاب ومذيب من نوع:", "options": {"أ": "سائل - سائل", "ب": "غاز - سائل", "ج": "صلب - سائل", "د": "غاز - غاز"}, "answer": "أ" },
        { "text": "ماء البحر والمطر من المحاليل، يكون المذيب والمذاب:", "options": {"أ": "سائل - سائل", "ب": "غاز - غاز", "ج": "سائل - غاز", "د": "صلب - صلب"}, "answer": "ج" },
        { "text": "ماء البحر من المحاليل، يكون المذاب والمذيب:", "options": {"أ": "سائل - سائل", "ب": "غاز - غاز", "ج": "سائل - غاز", "د": "صلب - سائل"}, "answer": "د" },
        { "text": "الطريقة الأنسب لفصل مكونات مخلوط غير متجانس مكون من مادة صلبة وسائلة:", "options": {"أ": "الترشيح", "ب": "التقطير", "ج": "التبلور", "د": "التسامي"}, "answer": "أ" },
        { "text": "طرق من فصل المواد عن طريق حاجز مسامي:", "options": {"أ": "الترشيح", "ب": "التقطير", "ج": "التبلور", "د": "التسامي"}, "answer": "أ" },
        { "text": "يتم فصل مخلوط مكون من ماء ورمل بواسطة:", "options": {"أ": "التسامي", "ب": "التقطير", "ج": "التبلور", "د": "الترشيح"}, "answer": "د" },
        { "text": "يمكن فصل مخلوط الملح والرمل بواسطة:", "options": {"أ": "التقطير", "ب": "التبلور", "ج": "الترشيح", "د": "الكروماتوجرافيا"}, "answer": "ج" },
        { "text": "طريقة لفصل مكونات الحبر المختلفة:", "options": {"أ": "الترشيح", "ب": "التبلور", "ج": "الكروماتوجرافيا", "د": "التقطير"}, "answer": "ج" },
        { "text": "طريقة لفصل السوائل بناءً على الاختلاف في درجة الغليان:", "options": {"أ": "التكثف", "ب": "الترشيح", "ج": "التبلور", "د": "التقطير"}, "answer": "د" },
        { "text": "شم رائحة النفتالين الصلب في الهواء بسبب:", "options": {"أ": "التسامي", "ب": "التكثف", "ج": "الترشيح", "د": "التقطير"}, "answer": "أ" },
        { "text": "أي خواص ملح الطعام يمثل خاصية كيميائية؟", "options": {"أ": "طعمه مالح", "ب": "لونه أبيض", "ج": "شكله بلوري", "د": "لا يتفاعل مع الماء النقي"}, "answer": "د" },
        { "text": "أي مما يلي خاصية كيميائية:", "options": {"أ": "مادة عديمة الرائحة", "ب": "الماء بدون طعم", "ج": "CO له رائحة", "د": "ملح يتحد مع الحمض ويتصاعد غاز"}, "answer": "د" },
        { "text": "أي التالي يعد من الخواص الكيميائية:", "options": {"أ": "الغليان", "ب": "التبخر", "ج": "فقدان الفضة لمعانها", "د": "توصيل الحرارة"}, "answer": "ج" },
        { "text": "أي مما يأتي تغير كيميائي؟", "options": {"أ": "سكر ذائب في ماء", "ب": "آيس كريم ينصهر", "ج": "عود ثقب مشتعل", "د": "ماء يغلي"}, "answer": "ج" },
        { "text": "أي الآتي يعد تغيراً كيميائياً:", "options": {"أ": "انصهار", "ب": "تكثف", "ج": "تحلل", "د": "تبلور"}, "answer": "ج" },
        { "text": "أي مما يأتي تغير كيميائي؟", "options": {"أ": "الانصهار", "ب": "العنصر", "ج": "الاحتراق", "د": "الذرة"}, "answer": "ج" },
        { "text": "تعد سبيكة الفولاذ مثال على:", "options": {"أ": "مركب", "ب": "مخلوط معلق", "ج": "مخلوط متجانس", "د": "مخلوط غير متجانس"}, "answer": "ج" },
        { "text": "أحد المواد الآتية يعتبر خليط متجانس:", "options": {"أ": "الشاي", "ب": "الحليب", "ج": "بيتزا", "د": "الدم"}, "answer": "أ" },
        { "text": "أي المخاليط الآتية متجانس:", "options": {"أ": "مخلوط المكسرات", "ب": "السلطة", "ج": "مجموعة من الفواكه", "د": "ملح الطعام المذاب في الماء"}, "answer": "د" },
        { "text": "إضافة غاز النشادر إلى الماء يعد محلول:", "options": {"أ": "غاز - سائل", "ب": "سائل - صلب", "ج": "صلب - صلب", "د": "غاز - غاز"}, "answer": "أ" },
        { "text": "طريقة فصل مكونات قلم الحبر عن الماء:", "options": {"أ": "الترشيح", "ب": "التبلور", "ج": "الكروماتوجرافيا", "د": "التقطير"}, "answer": "ج" },
        { "text": "يمكن فصل المركبات الحيوية مثل البروتينات بـ:", "options": {"أ": "الكروماتوجرافيا", "ب": "التقطير", "ج": "الترشيح", "د": "التبلور"}, "answer": "أ" }
    ];

    let currentIdx = 0; let score = 0; let log = [];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if(!name.trim()) return alert("لطفاً، أدخل اسمك قبل البدء.");
        document.getElementById('display-name').innerText = name;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();
        document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'none';
        feedback.className = 'feedback-box';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questions[currentIdx];
        document.getElementById('q-text').innerText = qData.text;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        Object.entries(qData.options).forEach(([key, val]) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = `${key}) ${val}`;
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selectedKey) {
        const qData = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const isCorrect = selectedKey === qData.answer;

        if(isCorrect) score++;
        log.push({
            q: qData.text,
            user: selectedKey + ") " + qData.options[selectedKey],
            correct: qData.answer + ") " + qData.options[qData.answer],
            status: isCorrect
        });

        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
            const optKey = opt.innerText.split(')')[0];
            if(optKey === qData.answer) opt.classList.add('correct');
            else if(optKey === selectedKey) opt.classList.add('wrong');
        });

        const fb = document.getElementById('feedback-box');
        fb.classList.add(isCorrect ? 'fb-success' : 'fb-danger');
        document.getElementById('fb-title').innerText = isCorrect ? "إجابة صحيحة ✅" : "إجابة غير صحيحة ❌";
        fb.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `تقرير المختبر: ${document.getElementById('student-name').value}`;
        document.getElementById('res-score').innerText = `درجتك: ${score} من ${questions.length}`;
        
        const perc = (score / questions.length) * 100;
        let eval = perc >= 90 ? "أداء مذهل! أنت تتقن هذا القسم بامتياز 🌟" : perc >= 70 ? "عمل رائع، استمر في المراجعة لتقوية نقاط الضعف ✨" : "بداية جيدة، لكن القسم يحتاج لتركيز أكثر 📚";
        document.getElementById('res-eval').innerText = eval;

        const body = document.getElementById('summary-body');
        log.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.q}</td><td style="color:${item.status?'#16a34a':'#dc2626'}; font-weight:bold;">${item.user}</td><td style="color:#16a34a; font-weight:bold;">${item.correct}</td><td>${item.status?'✅':'❌'}</td></tr>`;
        });
    }
</script>
</body>
</html>
